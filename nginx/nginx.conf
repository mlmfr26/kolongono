worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.santedirect.kolongono.org jitsi.santedirect.kolongono.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API FastAPI HTTPS ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.santedirect.kolongono.org;

        ssl_certificate     /etc/letsencrypt/live/api.santedirect.kolongono.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.santedirect.kolongono.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;

        # Auth — rate limit strict
        location = /api/auth/login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass       http://api:8002;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass       http://api:8002;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket signaling (fallback local si Jitsi hors ligne)
        location /ws/ {
            proxy_pass         http://api:8002;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # Swagger docs
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass http://api:8002;
            proxy_set_header Host $host;
        }
    }

    # ── Jitsi Meet self-hosted ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name jitsi.santedirect.kolongono.org;

        ssl_certificate     /etc/letsencrypt/live/jitsi.santedirect.kolongono.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jitsi.santedirect.kolongono.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000" always;

        # Jitsi Web frontend
        location / {
            proxy_pass         http://jitsi-web:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # BOSH/XMPP long-polling
        location /http-bind {
            proxy_pass         http://prosody:5280/http-bind;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # WebSocket XMPP
        location /xmpp-websocket {
            proxy_pass         http://prosody:5280/xmpp-websocket;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # Colibri WebSocket — JVB stats / bridge channel
        location ~ ^/colibri-ws/ {
            proxy_pass         http://jvb:9090;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }
    }
}
