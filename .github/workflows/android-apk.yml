name: Android APK — Debug

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 1. JS deps ────────────────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      # ── 2. Générer android/ depuis le template installé ──────────────────────
      - name: Generate android/ directory
        env:
          CI: "true"
        run: |
          TEMPLATE="$GITHUB_WORKSPACE/mobile/node_modules/react-native/template"
          DEST="$GITHUB_WORKSPACE/mobile/android"

          if [ -d "$TEMPLATE/android" ]; then
            echo "✓ Template trouvé dans node_modules/react-native/template/"
            cp -r "$TEMPLATE/android" "$DEST"
          else
            echo "Fallback : init via npx react-native@0.73.6..."
            cd /tmp
            npx --yes react-native@0.73.6 init SanteTemp --skip-install 2>&1
            cp -r /tmp/SanteTemp/android "$DEST"
          fi
          echo "=== android/ généré ==="
          ls "$DEST"

      # ── 3. Corriger le package name ──────────────────────────────────────────
      - name: Fix package name → com.santesd.kolongono
        run: |
          DEST="$GITHUB_WORKSPACE/mobile/android"
          for OLD in "com.helloworld" "com.santetemp" "com.santeTemp"; do
            find "$DEST" -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.xml" -o -name "*.kt" -o -name "*.java" \) \
              -exec grep -l "$OLD" {} \; 2>/dev/null | while read f; do
                sed -i "s|$OLD|com.santesd.kolongono|g" "$f"
              done
          done
          # Déplacer les sources Kotlin dans le bon package path
          for SRC in "$DEST/app/src/main/java" "$DEST/app/src/main/kotlin"; do
            [ -d "$SRC" ] || continue
            NEW="$SRC/com/santesd/kolongono"
            mkdir -p "$NEW"
            find "$SRC" -maxdepth 5 \( -name "*.kt" -o -name "*.java" \) | while read f; do
              [ "$(dirname "$f")" != "$NEW" ] && mv "$f" "$NEW/" 2>/dev/null || true
            done
          done

      # ── 4. AGP 8.6 + Gradle 8.7 + compileSdk 35 ─────────────────────────────
      - name: Upgrade build config (AGP 8.6 · Gradle 8.7 · compileSdk 35)
        run: |
          DEST="$GITHUB_WORKSPACE/mobile/android"

          echo "=== build.gradle TEMPLATE (diagnostic) ==="
          cat "$DEST/build.gradle"

          # Écraser build.gradle entièrement — pas de regex, garantie 100%
          cat > "$DEST/build.gradle" << 'GRADLE'
          buildscript {
              ext {
                  buildToolsVersion = "35.0.0"
                  minSdkVersion = 23
                  compileSdkVersion = 35
                  targetSdkVersion = 34
                  ndkVersion = "25.1.8937393"
                  kotlinVersion = "1.9.25"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.6.0")
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
              }
          }
          apply plugin: "com.facebook.react.rootproject"
          GRADLE

          echo "✓ build.gradle → AGP 8.6.0 · compileSdk 35"
          cat "$DEST/build.gradle"

          # Gradle wrapper → 8.7
          cat > "$DEST/gradle/wrapper/gradle-wrapper.properties" << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          echo "✓ gradle-wrapper.properties → Gradle 8.7"
          cat "$DEST/gradle/wrapper/gradle-wrapper.properties"

          # VisionCamera CodeScanner
          GP="$DEST/gradle.properties"
          grep -q "VisionCamera_enableCodeScanner" "$GP" 2>/dev/null || \
            echo "VisionCamera_enableCodeScanner=true" >> "$GP"
          echo "✓ VisionCamera_enableCodeScanner configuré"

      # ── 5. ABI arm64-v8a (~25-35 MB) ─────────────────────────────────────────
      - name: Limit ABI to arm64-v8a
        run: |
          python3 - <<'PY'
          import re
          path = "mobile/android/app/build.gradle"
          txt  = open(path).read()
          if 'abiFilters' in txt:
              print("abiFilters déjà présent — skip")
          else:
              patched = re.sub(
                  r'(versionName\s+"[^"]*")',
                  r'\1\n        ndk {\n            abiFilters "arm64-v8a"\n        }',
                  txt, count=1)
              open(path, "w").write(patched)
              print("✓ ABI arm64-v8a injecté" if patched != txt else "WARNING: versionName non trouvé")
          PY

      # ── 6. Permissions caméra ────────────────────────────────────────────────
      - name: Add camera permissions
        run: |
          M="mobile/android/app/src/main/AndroidManifest.xml"
          grep -q "CAMERA" "$M" && echo "Déjà présent" || \
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$M"

      # ── 7. SDK path + Gradle ─────────────────────────────────────────────────
      - name: Prepare Gradle
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✓ sdk.dir=$ANDROID_HOME"

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: '-Xmx4096m'
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m'

      # ── 9. Upload ─────────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SanteDirect-debug-arm64-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
