name: Android APK — Debug

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 1. JS deps ────────────────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      # ── 2. Générer android/ depuis le template installé ──────────────────────
      - name: Generate android/ directory
        env:
          CI: "true"
        run: |
          TEMPLATE="$GITHUB_WORKSPACE/mobile/node_modules/react-native/template"
          DEST="$GITHUB_WORKSPACE/mobile/android"

          if [ -d "$TEMPLATE/android" ]; then
            echo "✓ Template trouvé dans node_modules/react-native/template/"
            cp -r "$TEMPLATE/android" "$DEST"
          else
            echo "Fallback : init via npx react-native@0.73.6..."
            cd /tmp
            npx --yes react-native@0.73.6 init SanteTemp --skip-install 2>&1
            cp -r /tmp/SanteTemp/android "$DEST"
          fi
          echo "=== android/ généré ==="
          ls "$DEST"

      # ── 3. Corriger le package name ──────────────────────────────────────────
      - name: Fix package name → com.santesd.kolongono
        run: |
          DEST="$GITHUB_WORKSPACE/mobile/android"
          for OLD in "com.helloworld" "com.santetemp" "com.santeTemp"; do
            find "$DEST" -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.xml" -o -name "*.kt" -o -name "*.java" \) \
              -exec grep -l "$OLD" {} \; 2>/dev/null | while read f; do
                sed -i "s|$OLD|com.santesd.kolongono|g" "$f"
              done
          done
          # Déplacer les sources Kotlin dans le bon package path
          for SRC in "$DEST/app/src/main/java" "$DEST/app/src/main/kotlin"; do
            [ -d "$SRC" ] || continue
            NEW="$SRC/com/santesd/kolongono"
            mkdir -p "$NEW"
            find "$SRC" -maxdepth 5 \( -name "*.kt" -o -name "*.java" \) | while read f; do
              [ "$(dirname "$f")" != "$NEW" ] && mv "$f" "$NEW/" 2>/dev/null || true
            done
          done

      # ── 4. Mettre à jour AGP 8.1 → 8.6 · Gradle 8.7 · compileSdk 35 ────────────
      - name: Upgrade build config (AGP 8.6 · Gradle 8.7 · compileSdk 35)
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          BASE = Path("mobile/android")

          # ── 4a. build.gradle (projet) ─────────────────────────────────────────
          bg = BASE / "build.gradle"
          print("=== build.gradle AVANT ===")
          print(bg.read_text())

          txt = bg.read_text()
          # AGP classpath DSL : classpath 'com.android.tools.build:gradle:X.Y.Z'
          txt = re.sub(
              r'com\.android\.tools\.build:gradle:[0-9.]+',
              'com.android.tools.build:gradle:8.6.0',
              txt)
          # AGP plugins block double-quote : id("com.android.application") version "X.Y.Z"
          txt = re.sub(
              r'id\("com\.android\.application"\)\s+version\s+"[^"]+"',
              'id("com.android.application") version "8.6.0"',
              txt)
          # AGP plugins block single-quote : id 'com.android.application' version 'X.Y.Z'
          txt = re.sub(
              r"id\s+'com\.android\.application'\s+version\s+'[^']+'",
              "id 'com.android.application' version '8.6.0'",
              txt)
          # compileSdkVersion = 34
          txt = re.sub(r'compileSdkVersion\s*=\s*\d+', 'compileSdkVersion = 35', txt)
          # buildToolsVersion = "X.Y.Z"
          txt = re.sub(r'buildToolsVersion\s*=\s*"[^"]+"', 'buildToolsVersion = "35.0.0"', txt)
          bg.write_text(txt)
          print("=== build.gradle APRES ===")
          print(bg.read_text())

          # ── 4b. settings.gradle : AGP dans plugins{} ──────────────────────────
          sg = BASE / "settings.gradle"
          if sg.exists():
              stxt = sg.read_text()
              stxt = re.sub(
                  r'com\.android\.tools\.build:gradle:[0-9.]+',
                  'com.android.tools.build:gradle:8.6.0',
                  stxt)
              # plugins block dans settings.gradle (catalog)
              stxt = re.sub(
                  r'(id\s*["\']com\.android\.tools\.build\.gradle["\']\s+version\s*["\'])[^"\']+(["\'])',
                  r'\g<1>8.6.0\2',
                  stxt)
              sg.write_text(stxt)
              print("=== settings.gradle APRES ===")
              print(sg.read_text())

          # ── 4c. app/build.gradle : compileSdk + targetSdk ─────────────────────
          abg = BASE / "app" / "build.gradle"
          print("=== app/build.gradle AVANT ===")
          print(abg.read_text())

          atxt = abg.read_text()
          # compileSdk 34  ou  compileSdkVersion 34
          atxt = re.sub(r'compileSdk(Version)?\s+\d+', lambda m: f'compileSdk{m.group(1) or ""} 35', atxt)
          # targetSdk 34   ou  targetSdkVersion 34  → garder à 34 (compatibilité)
          # (on ne touche pas targetSdk intentionnellement)
          abg.write_text(atxt)
          print("=== app/build.gradle APRES ===")
          print(abg.read_text())

          # ── 4d. gradle-wrapper.properties : écriture directe ─────────────────
          wrapper = BASE / "gradle" / "wrapper" / "gradle-wrapper.properties"
          wrapper.parent.mkdir(parents=True, exist_ok=True)
          wrapper_content = (
              "distributionBase=GRADLE_USER_HOME\n"
              "distributionPath=wrapper/dists\n"
              "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip\n"
              "networkTimeout=10000\n"
              "validateDistributionUrl=true\n"
              "zipStoreBase=GRADLE_USER_HOME\n"
              "zipStorePath=wrapper/dists\n"
          )
          wrapper.write_text(wrapper_content)
          print("=== gradle-wrapper.properties APRES ===")
          print(wrapper.read_text())

          # ── 4e. gradle.properties : VisionCamera ─────────────────────────────
          gp = BASE / "gradle.properties"
          gp_txt = gp.read_text() if gp.exists() else ""
          if "VisionCamera_enableCodeScanner" not in gp_txt:
              gp_txt += "\nVisionCamera_enableCodeScanner=true\n"
              gp.write_text(gp_txt)
              print("✓ VisionCamera_enableCodeScanner ajouté dans gradle.properties")
          else:
              print("VisionCamera_enableCodeScanner déjà présent — skip")
          PY

      # ── 5. ABI arm64-v8a (~25-35 MB) ─────────────────────────────────────────
      - name: Limit ABI to arm64-v8a
        run: |
          python3 - <<'PY'
          import re
          path = "mobile/android/app/build.gradle"
          txt  = open(path).read()
          if 'abiFilters' in txt:
              print("abiFilters déjà présent — skip")
          else:
              patched = re.sub(
                  r'(versionName\s+"[^"]*")',
                  r'\1\n        ndk {\n            abiFilters "arm64-v8a"\n        }',
                  txt, count=1)
              open(path, "w").write(patched)
              print("✓ ABI arm64-v8a injecté" if patched != txt else "WARNING: versionName non trouvé")
          PY

      # ── 6. Permissions caméra ────────────────────────────────────────────────
      - name: Add camera permissions
        run: |
          M="mobile/android/app/src/main/AndroidManifest.xml"
          grep -q "CAMERA" "$M" && echo "Déjà présent" || \
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$M"

      # ── 7. SDK path + Gradle ─────────────────────────────────────────────────
      - name: Prepare Gradle
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✓ sdk.dir=$ANDROID_HOME"

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: '-Xmx4096m'
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m'

      # ── 9. Upload ─────────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SanteDirect-debug-arm64-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
