name: Android APK — Debug

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 1. JS deps ────────────────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      # ── 2. Générer android/ depuis le template installé ──────────────────────
      - name: Generate android/ directory
        env:
          CI: "true"
        run: |
          TEMPLATE="$GITHUB_WORKSPACE/mobile/node_modules/react-native/template"
          DEST="$GITHUB_WORKSPACE/mobile/android"

          if [ -d "$TEMPLATE/android" ]; then
            echo "✓ Template trouvé dans node_modules/react-native/template/"
            cp -r "$TEMPLATE/android" "$DEST"
          else
            echo "Fallback : init via npx react-native@0.73.6..."
            cd /tmp
            npx --yes react-native@0.73.6 init SanteTemp --skip-install 2>&1
            cp -r /tmp/SanteTemp/android "$DEST"
          fi
          echo "=== android/ généré ==="
          ls "$DEST"

      # ── 2.5 Injecter google-services.json ───────────────────────────────────
      - name: Inject google-services.json
        run: |
          cp mobile/google-services.json mobile/android/app/google-services.json
          echo "✓ google-services.json → android/app/"

      # ── 3. Corriger le package name + app name ───────────────────────────────
      - name: Fix package name → com.santesd.kolongono + app name → SantéDirect
        run: |
          DEST="$GITHUB_WORKSPACE/mobile/android"
          for OLD in "com.helloworld" "com.santetemp" "com.santeTemp"; do
            find "$DEST" -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.xml" -o -name "*.kt" -o -name "*.java" \) \
              -exec grep -l "$OLD" {} \; 2>/dev/null | while read f; do
                sed -i "s|$OLD|com.santesd.kolongono|g" "$f"
              done
          done
          # Déplacer les sources Kotlin dans le bon package path
          for SRC in "$DEST/app/src/main/java" "$DEST/app/src/main/kotlin"; do
            [ -d "$SRC" ] || continue
            NEW="$SRC/com/santesd/kolongono"
            mkdir -p "$NEW"
            find "$SRC" -maxdepth 5 \( -name "*.kt" -o -name "*.java" \) | while read f; do
              [ "$(dirname "$f")" != "$NEW" ] && mv "$f" "$NEW/" 2>/dev/null || true
            done
          done
          # Corriger le nom affiché de l'app (strings.xml)
          STRINGS="$DEST/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">SantéDirect</string>|' "$STRINGS"
            echo "✓ app_name → SantéDirect"
            grep "app_name" "$STRINGS"
          fi

      # ── 3.3 Appliquer le plugin google-services dans app/build.gradle ──────────
      - name: Apply google-services plugin in app/build.gradle
        run: |
          ABG="mobile/android/app/build.gradle"
          if grep -q "com.google.gms.google-services" "$ABG"; then
            echo "Plugin déjà présent"
          else
            sed -i '/^apply plugin: "com.android.application"/a apply plugin: "com.google.gms.google-services"' "$ABG"
            echo "✓ com.google.gms.google-services appliqué"
          fi
          grep "gms" "$ABG" || echo "(plugin non trouvé — vérifier)"

      # ── 3.5 Désactiver Metro dev server (APK autonome, sans dev machine) ───────
      - name: Disable Metro dev server in MainApplication.kt
        run: |
          # RN debug builds ont getUseDeveloperSupport()=BuildConfig.DEBUG=true
          # → l'app cherche Metro au démarrage et affiche "Could not connect to dev server"
          # Fix : retourner false pour charger le bundle embarqué directement
          find mobile/android -name "MainApplication.kt" -print0 | \
            xargs -0 -I{} sed -i \
              's/getUseDeveloperSupport(): Boolean = BuildConfig\.DEBUG/getUseDeveloperSupport(): Boolean = false/' \
              {}
          echo "=== Vérification MainApplication.kt ==="
          find mobile/android -name "MainApplication.kt" -exec grep -n "getUseDeveloperSupport" {} \; || echo "(fichier non trouvé)"

      # ── 4. AGP 8.6 + Gradle 8.7 + compileSdk 35 + JVM 17 ───────────────────────
      - name: Upgrade build config (AGP 8.6 · Gradle 8.7 · compileSdk 35)
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          dest = Path("mobile/android")

          # ── 4a. build.gradle PROJET — écriture complète ──────────────────────────
          # node_modules/react-native/android/ ne contient qu'un README.md (pas d'AARs).
          # Solution : forcer la version 0.73.6 depuis Maven Central via resolutionStrategy.
          # com.facebook.react.settings n'existe que dans RN 0.74+ — on n'y touche pas.
          print("=== build.gradle TEMPLATE ===")
          bg = dest / "build.gradle"
          print(bg.read_text() if bg.exists() else "(absent)")

          bg.write_text(
              'buildscript {\n'
              '    ext {\n'
              '        buildToolsVersion = "35.0.0"\n'
              '        minSdkVersion = 23\n'
              '        compileSdkVersion = 35\n'
              '        targetSdkVersion = 34\n'
              '        ndkVersion = "25.1.8937393"\n'
              '        kotlinVersion = "1.9.25"\n'
              '    }\n'
              '    repositories {\n'
              '        google()\n'
              '        mavenCentral()\n'
              '    }\n'
              '    dependencies {\n'
              '        classpath("com.android.tools.build:gradle:8.6.0")\n'
              '        classpath("com.facebook.react:react-native-gradle-plugin")\n'
              '        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")\n'
              '        classpath("com.google.gms:google-services:4.4.2")\n'
              '    }\n'
              '}\n'
              '\n'
              'apply plugin: "com.facebook.react.rootproject"\n'
              '\n'
              'allprojects {\n'
              '    repositories {\n'
              '        maven { url "$rootDir/../node_modules/react-native/android" }\n'
              '        maven { url "$rootDir/../node_modules/jsc-android/dist" }\n'
              '        google()\n'
              '        mavenCentral()\n'
              '        maven { url "https://www.jitpack.io" }\n'
              '    }\n'
              '}\n'
          )
          print("✓ build.gradle → AGP 8.6.0 · compileSdk 35 · allprojects repos")

          # ── 4b. app/build.gradle — JVM 17 ───────────────────────────────────────
          abg = dest / "app" / "build.gradle"
          atxt = abg.read_text()
          atxt = re.sub(r'JavaVersion\.VERSION_\w+', 'JavaVersion.VERSION_17', atxt)
          if 'jvmTarget' in atxt:
              atxt = re.sub(r'jvmTarget\s*=\s*"[^"]+"', 'jvmTarget = "17"', atxt)
          else:
              atxt = re.sub(
                  r'(compileOptions\s*\{[^}]+\})',
                  r'\1\n    kotlinOptions {\n        jvmTarget = "17"\n    }',
                  atxt, flags=re.DOTALL)
          abg.write_text(atxt)
          print("✓ app/build.gradle → JVM 17")

          # ── 4c. gradle-wrapper.properties — Gradle 8.7 ──────────────────────────
          wrapper = dest / "gradle" / "wrapper" / "gradle-wrapper.properties"
          wrapper.parent.mkdir(parents=True, exist_ok=True)
          wrapper.write_text(
              "distributionBase=GRADLE_USER_HOME\n"
              "distributionPath=wrapper/dists\n"
              "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip\n"
              "networkTimeout=10000\n"
              "validateDistributionUrl=true\n"
              "zipStoreBase=GRADLE_USER_HOME\n"
              "zipStorePath=wrapper/dists\n"
          )
          print("✓ gradle-wrapper.properties → Gradle 8.7")

          # ── 4d. gradle.properties — VisionCamera ────────────────────────────────
          gp = dest / "gradle.properties"
          gp_txt = gp.read_text() if gp.exists() else ""
          if "VisionCamera_enableCodeScanner" not in gp_txt:
              gp_txt += "\nVisionCamera_enableCodeScanner=true\n"
              gp.write_text(gp_txt)
              print("✓ VisionCamera_enableCodeScanner=true ajouté")
          else:
              print("VisionCamera_enableCodeScanner déjà présent")

          # ── 4e. Diagnostic settings.gradle (pas de modification) ────────────────
          # com.facebook.react.settings n'existe pas dans RN 0.73.6 (@react-native/gradle-plugin).
          # Il a été introduit dans RN 0.74+. On conserve le settings.gradle du template.
          sg = dest / "settings.gradle"
          print(f"\n=== settings.gradle (conservé du template) ===")
          print(sg.read_text() if sg.exists() else "(absent)")

          PY

      # ── 4.5 Rétrograder libs incompatibles avec react-android 0.73.x ─────────
      - name: Downgrade screens+gesture-handler (RN 0.73-compatible)
        working-directory: mobile
        run: |
          echo "=== Versions avant rétrogradation ==="
          python3 -c "import json; print('screens:', json.load(open('node_modules/react-native-screens/package.json'))['version'])" 2>/dev/null || echo "screens: absent"
          python3 -c "import json; print('gesture-handler:', json.load(open('node_modules/react-native-gesture-handler/package.json'))['version'])" 2>/dev/null || echo "gesture-handler: absent"
          echo "=== Rétrogradation vers versions RN 0.73-compatibles ==="
          npm install --legacy-peer-deps react-native-screens@3.29.0 react-native-gesture-handler@2.14.0
          echo "=== Versions après rétrogradation ==="
          python3 -c "import json; print('screens:', json.load(open('node_modules/react-native-screens/package.json'))['version'])"
          python3 -c "import json; print('gesture-handler:', json.load(open('node_modules/react-native-gesture-handler/package.json'))['version'])"

      # ── 5. ABI arm64-v8a (~25-35 MB) ─────────────────────────────────────────
      - name: Limit ABI to arm64-v8a
        run: |
          python3 - <<'PY'
          import re
          path = "mobile/android/app/build.gradle"
          txt  = open(path).read()
          if 'abiFilters' in txt:
              print("abiFilters déjà présent — skip")
          else:
              patched = re.sub(
                  r'(versionName\s+"[^"]*")',
                  r'\1\n        ndk {\n            abiFilters "arm64-v8a"\n        }',
                  txt, count=1)
              open(path, "w").write(patched)
              print("✓ ABI arm64-v8a injecté" if patched != txt else "WARNING: versionName non trouvé")
          PY

      # ── 5.5 Icône de l'app ───────────────────────────────────────────────────
      - name: Generate app icon (cross médical sur fond sombre)
        run: |
          python3 - <<'PY'
          import struct, zlib, os

          # Pure Python PNG generator — no external tools needed
          # Dark #1A1A2E background + white medical cross
          def make_icon_png(size):
              bg = (0x1A, 0x1A, 0x2E, 255)
              fg = (255, 255, 255, 255)
              cx = cy = size // 2
              arm_w = max(3, size // 6)
              arm_l = max(6, int(size * 0.55))
              rows = []
              for y in range(size):
                  row = bytearray()
                  for x in range(size):
                      in_h = abs(y - cy) <= arm_w and abs(x - cx) <= arm_l
                      in_v = abs(x - cx) <= arm_w and abs(y - cy) <= arm_l
                      r, g, b, a = fg if (in_h or in_v) else bg
                      row += bytes([r, g, b, a])
                  rows.append(bytes(row))

              def chunk(tag, data):
                  c = tag + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xFFFFFFFF)

              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0))
              raw = b''.join(b'\x00' + r for r in rows)
              idat = chunk(b'IDAT', zlib.compress(raw, 9))
              iend = chunk(b'IEND', b'')
              return b'\x89PNG\r\n\x1a\n' + ihdr + idat + iend

          sizes = {
              "mipmap-mdpi": 48, "mipmap-hdpi": 72, "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144, "mipmap-xxxhdpi": 192,
          }
          dest_base = "mobile/android/app/src/main/res"
          for folder, size in sizes.items():
              out_dir = f"{dest_base}/{folder}"
              os.makedirs(out_dir, exist_ok=True)
              png = make_icon_png(size)
              for name in ("ic_launcher.png", "ic_launcher_round.png"):
                  with open(f"{out_dir}/{name}", "wb") as f:
                      f.write(png)
              print(f"✓ {folder} → {size}x{size}")
          print("=== Icônes générées (pure Python) ===")
          PY

      # ── 6. Permissions caméra ────────────────────────────────────────────────
      - name: Add camera permissions
        run: |
          M="mobile/android/app/src/main/AndroidManifest.xml"
          grep -q "CAMERA" "$M" && echo "Déjà présent" || \
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$M"

      # ── 7. SDK path + Gradle ─────────────────────────────────────────────────
      - name: Prepare Gradle
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✓ sdk.dir=$ANDROID_HOME"

      # ── 7.5 Bundle JS → index.android.bundle (APK autonome, sans Metro) ───────
      - name: Bundle JS into APK assets
        working-directory: mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/
          echo "✓ Bundle: $(du -sh android/app/src/main/assets/index.android.bundle)"

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "══════════════════════════════════════════"
            echo "  ERREURS DE COMPILATION (lignes e: / FAILED)"
            echo "══════════════════════════════════════════"
            grep -E "^e:|error:|> Task.*FAILED" /tmp/build.log | head -80 || true
            echo "══════════════════════════════════════════"
          fi
          exit $EXIT
        env:
          JAVA_OPTS: '-Xmx4096m'
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m'

      # ── 9. Log complet en cas d'échec ────────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 3
          if-no-files-found: ignore

      # ── 10. Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SanteDirect-debug-arm64-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
