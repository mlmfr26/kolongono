name: Android APK — Debug

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:          # déclenchement manuel depuis GitHub

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node 18 ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      # ── 4. Install JS deps ───────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: mobile
        run: npm install

      # ── 5. Générer android/ via react-native init ────────────────────────────
      # Le projet n'a pas de dossier android/ — on génère le template puis on relie
      - name: Generate android/ directory
        working-directory: mobile
        run: |
          # Initialise un projet temporaire pour récupérer le template android/
          npx @react-native-community/cli@13 init SanteTemp --version 0.73.0 --skip-install --skip-git-init --directory /tmp/rn-template
          cp -r /tmp/rn-template/android ./android
          # Mettre à jour le nom de l'application
          sed -i 's/com.santetemp/com.santesd.kolongono/g' android/app/build.gradle
          sed -i 's/com.santetemp/com.santesd.kolongono/g' android/app/src/main/AndroidManifest.xml
          sed -i 's/com.santetemp/com.santesd.kolongono/g' android/app/src/main/java/com/santetemp/MainActivity.kt 2>/dev/null || true
          # Renommer les dossiers Java package si nécessaire
          find android -name "*.kt" -o -name "*.java" | xargs sed -i 's/package com.santetemp/package com.santesd.kolongono/g' 2>/dev/null || true
          find android -name "*.kt" -o -name "*.java" | xargs sed -i 's/import com.santetemp/import com.santesd.kolongono/g' 2>/dev/null || true

      # ── 6. Permissions caméra (react-native-vision-camera) ──────────────────
      - name: Configure camera permissions
        working-directory: mobile
        run: |
          # Ajouter les permissions caméra dans AndroidManifest.xml si absentes
          if ! grep -q "android.permission.CAMERA" android/app/src/main/AndroidManifest.xml; then
            sed -i 's/<uses-permission android:name="android.permission.INTERNET"/\
          <uses-permission android:name="android.permission.CAMERA" \/>\
          <uses-permission android:name="android.permission.INTERNET"/' android/app/src/main/AndroidManifest.xml
          fi

      # ── 7. Gradle wrapper permissions ────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      # ── 8. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_OPTS: '-Xmx4096m'

      # ── 9. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SanteDirect-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
