<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SantéDirect Kolongono — Connexion</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    body {
      min-height: 100vh;
      background: #F4F6FA;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      overflow: hidden;
      position: relative;
    }
    .blob { position: fixed; border-radius: 50%; pointer-events: none; }
    .blob-blue   { width: 480px; height: 480px; background: var(--blue);   opacity: .35; top: -160px; right: -120px; }
    .blob-purple { width: 320px; height: 320px; background: var(--purple); opacity: .30; bottom: -100px; left: -80px; }
    .blob-green  { width: 200px; height: 200px; background: var(--green);  opacity: .28; top: 40%; left: 5%; }

    .login-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: var(--radius-xxl);
      padding: var(--space-xxxl);
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 1;
    }
    .login-header { text-align: center; margin-bottom: var(--space-xxxl); }
    .login-logo { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 18px; background: var(--dark); margin-bottom: var(--space-lg); box-shadow: var(--shadow-nav); }
    .login-title { font-size: var(--font-xxl); font-weight: 900; color: var(--color-text); }
    .login-sub { color: var(--color-text-muted); font-size: var(--font-sm); margin-top: 6px; }

    .form-group { margin-bottom: var(--space-lg); }
    .form-label { display: block; font-size: var(--font-sm); font-weight: 600; color: var(--color-text); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: var(--font-md);
      color: var(--color-text);
      background: var(--color-bg);
      transition: border-color .15s;
      box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: var(--dark); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--font-md);
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: var(--space-sm);
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg { color: #DC2626; font-size: var(--font-sm); text-align: center; margin-top: var(--space-md); display: none; padding: 10px; background: #FEF2F2; border-radius: var(--radius-lg); }
  </style>
</head>
<body>
  <div class="blob blob-blue"></div>
  <div class="blob blob-purple"></div>
  <div class="blob blob-green"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="16" y="4" width="8" height="32" rx="4" fill="white"/>
          <rect x="4" y="16" width="32" height="8" rx="4" fill="white"/>
        </svg>
      </div>
      <div class="login-title">SantéDirect</div>
      <div class="login-sub">Kolongono · Système de santé communautaire</div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="vous@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit" id="submitBtn">Se connecter</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <script>
    // Si déjà connecté et token valide → rediriger directement
    (function(){
      var tok = localStorage.getItem('sd_token');
      var usr = localStorage.getItem('sd_user');
      if (tok && usr) {
        try {
          var p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
          if (!p.exp || Date.now()/1000 < p.exp) {
            redirectByRole(JSON.parse(usr).role);
            return;
          }
        } catch(e) {}
        localStorage.removeItem('sd_token');
        localStorage.removeItem('sd_user');
      }
    })();

    var ROLE_PAGES = {
      'superadmin':        'admin.html',
      'admin':             'admin.html',
      'medecin':           'medecin.html',
      'auxiliaire':        'auxiliaire.html',
      'adherent':          'adherent.html',
      'responsable_centre':'centre.html',
    };

    function redirectByRole(role) {
      location.href = ROLE_PAGES[role] || 'admin.html';
    }

    var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
              ? 'http://localhost:8002' : '';

    async function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      var err = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      err.style.display = 'none';
      try {
        var res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erreur de connexion');
        localStorage.setItem('sd_token', data.access_token);
        localStorage.setItem('sd_user',  JSON.stringify(data.user));
        redirectByRole(data.user.role);
      } catch(e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
